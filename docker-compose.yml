# ============================================================================
# SafeLLM OSS Docker Compose - Minimal Stack
# ============================================================================
# This compose file runs only the OSS-safe services:
# - APISIX (gateway)
# - Sidecar (OSS edition)
# - Redis (cache)
# - Upstream (httpbin)

services:
  apisix:
    image: apache/apisix:3.14.1-debian
    restart: unless-stopped
    volumes:
      - ./config/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./config/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    ports:
      - "${APISIX_HTTP_PORT:-9080}:9080"
    networks:
      - frontend-net
      - backend-net
    depends_on:
      sidecar:
        condition: service_healthy

  sidecar:
    build:
      context: .
      dockerfile: sidecar/Dockerfile
      args:
        EDITION: oss
    restart: unless-stopped
    environment:
      SAFELLM_EDITION: oss
      ENABLE_METRICS: "true"
      ENABLE_AUDIT_LOGS: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - backend-net
      - monitor-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy volatile-lru
    volumes:
      - redis_data:/data
    networks:
      backend-net:
        aliases:
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  upstream:
    image: kennethreitz/httpbin:latest
    networks:
      - backend-net

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true
  monitor-net:
    driver: bridge

volumes:
  redis_data:
    driver: local
