# ============================================================================
# SafeLLM OSS Release Workflow
# ============================================================================
# Triggered by pushing a version tag (vX.Y.Z)
#
# This workflow:
# 1. Builds multi-arch Docker image (amd64, arm64)
# 2. Pushes to GHCR and optionally Docker Hub
# 3. Creates GitHub Release with notes and checksums
# ============================================================================

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: safellmio/safellm-apisix-gateway-sidecar

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "major_minor=$MAJOR.$MINOR" >> $GITHUB_OUTPUT

      - name: Verify VERSION file matches tag
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '\n')
          TAG_VERSION=${{ steps.version.outputs.version }}
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION file ($FILE_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "VERSION file matches tag: $FILE_VERSION"

      - name: Set up QEMU (for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Optional: Login to Docker Hub (requires DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets)
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./sidecar/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            EDITION=oss
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate image digest file
        run: |
          echo "Image: ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}" > checksums.txt
          echo "Version: ${{ steps.version.outputs.version }}" >> checksums.txt
          echo "Digest: ${{ steps.build.outputs.digest }}" >> checksums.txt
          echo "" >> checksums.txt
          echo "Pull commands:" >> checksums.txt
          echo "  docker pull ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}" >> checksums.txt
          echo "  docker pull ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major_minor }}" >> checksums.txt
          echo "  docker pull ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}" >> checksums.txt
          echo "  docker pull ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" >> checksums.txt

      - name: Package Helm chart
        run: |
          helm package helm/safellm-oss --destination .

      - name: Generate release notes
        id: notes
        run: |
          cat << 'EOF' > release_notes.md
          ## What's included
          - SafeLLM OSS container image for `linux/amd64` and `linux/arm64`
          - Helm chart `safellm-oss` (version `${{ steps.version.outputs.version }}`)
          - Production `docker-compose.release.yaml`
          - Immutable image digest for supply-chain verification

          ## How to run

          ### Kubernetes (Helm, recommended)
          ```bash
          helm repo add safellm https://safellm.github.io/charts
          helm repo update
          helm install safellm safellm/safellm-oss --version ${{ steps.version.outputs.version }}
          ```

          ### Docker Compose
          ```bash
          curl -O https://raw.githubusercontent.com/${{ github.repository }}/v${{ steps.version.outputs.version }}/docker-compose.release.yaml
          docker compose -f docker-compose.release.yaml up -d
          ```

          ## Docker images

          ```bash
          ghcr.io/safellmio/safellm-apisix-gateway-sidecar:${{ steps.version.outputs.version }}
          ghcr.io/safellmio/safellm-apisix-gateway-sidecar:${{ steps.version.outputs.major_minor }}
          ghcr.io/safellmio/safellm-apisix-gateway-sidecar:${{ steps.version.outputs.major }}
          ```

          Digest:
          - `${{ steps.build.outputs.digest }}`

          ## Breaking changes
          - None.

          See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for full details.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          files: |
            checksums.txt
            docker-compose.release.yaml
            safellm-oss-${{ steps.version.outputs.version }}.tgz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
