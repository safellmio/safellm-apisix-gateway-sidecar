services:
  apisix:
    image: apache/apisix:3.14.1-debian
    restart: unless-stopped
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    ports:
      - "${APISIX_HTTP_PORT:-19080}:9080"
    networks:
      - frontend-net
      - backend-net
    depends_on:
      sidecar:
        condition: service_healthy

  sidecar:
    image: safellm/safellm-apisix-gateway-sidecar:2.1.0
    restart: unless-stopped
    environment:
      SAFELLM_EDITION: oss
      ENABLE_CACHE: "true"
      ENABLE_METRICS: "true"
      SHADOW_MODE: "${SHADOW_MODE:-true}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAX_BODY_SIZE: 1048576
    networks:
      - backend-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy volatile-lru
    volumes:
      - redis_data:/data
    networks:
      backend-net:
        aliases:
          - redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  upstream:
    image: kennethreitz/httpbin:latest
    restart: unless-stopped
    networks:
      - backend-net

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
    internal: true

volumes:
  redis_data:
    driver: local
